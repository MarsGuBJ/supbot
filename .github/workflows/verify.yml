name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      AUTOPILOT_BENCHMARK_REPORT: artifacts/autopilot-benchmark.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm audit --audit-level=high --registry=https://registry.npmjs.org
      - run: npm run verify
      - name: Build Windows updater artifacts
        run: npm run dist:win
      - name: Upload Windows updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supbot-windows-x64-${{ github.sha }}
          path: |
            apps/desktop/release/Supbot-*-win-x64.exe
            apps/desktop/release/Supbot-*-win-x64.exe.blockmap
          if-no-files-found: error
      - name: Upload Autopilot benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-benchmark
          path: artifacts/autopilot-benchmark.json
          if-no-files-found: warn
